kind = "web"
previewPath = "/"
title = "Campus Online"
version = "1.0.0"
id = "artifacts/campus-online"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24753

[services.development]
run = "pnpm --filter @workspace/campus-online run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campus-online", "run", "build" ]
publicDir = "artifacts/campus-online/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24753"
BASE_PATH = "/"
